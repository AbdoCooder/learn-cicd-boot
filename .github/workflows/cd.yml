name: cd

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26.0"

      - name: Build The App
        run: chmod +x ./scripts/buildprod.sh && bash scripts/buildprod.sh

      - name: GCP Auth
        uses: 'google-github-actions/auth@v3'
        with:
          credentials_json: '${{ secrets.GCP_CREDENTIALS }}'

      - name: 'Set up Cloud SDK'
        uses: 'google-github-actions/setup-gcloud@v3'
        with:
          version: '>= 363.0.0'

      - name: 'Use gcloud CLI'
        run: 'gcloud info'

      - name: Build & Push to Registry
        run: gcloud builds submit --tag us-central1-docker.pkg.dev/learn-ci-cd-boot-dev/notely-ar-repo/notely:latest .

      - name: Deploy to Cloud Run
        run: gcloud run deploy notely --image us-central1-docker.pkg.dev/learn-ci-cd-boot-dev/notely-ar-repo/notely:latest --region us-central1 --allow-unauthenticated --project learn-ci-cd-boot-dev --max-instances=4
